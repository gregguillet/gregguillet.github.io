<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title == "Home" %}{{ site.title }}{% else %}{{ page.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>

  <header>
    <nav>
      <div class="nav-title">{{ page.title | default: "Home" }}</div>
      <div class="nav-links">
        {% for item in site.navigation %}
          <a href="{{ item.url | relative_url }}" {% if page.url == item.url or page.url == item.url | append: "/" %}class="active"{% endif %}>{{ item.title }}</a>
          {% unless forloop.last %}<span class="dot">.</span>{% endunless %}
        {% endfor %}
      </div>
      <div class="nav-posts">
        {% for post in site.posts limit:3 %}
          <a href="{{ post.url | relative_url }}">{{ post.date | date: "%b %d, %Y" }}</a>
          {% unless forloop.last %}<span class="dot">.</span>{% endunless %}
        {% endfor %}
      </div>
    </nav>
  </header>

  <main>
    <hr />
    {{ content }}
  </main>

</body>
</html>
